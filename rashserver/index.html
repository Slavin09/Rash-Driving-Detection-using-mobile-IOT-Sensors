<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>IMU Cube Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#111; color:#eee; }
    #ui { position: absolute; left:10px; top:10px; z-index:20; background: rgba(0,0,0,0.55); padding:10px; border-radius:8px; }
    #canvasContainer { width:calc(100vw - 260px); height:100vh; float:left; }
    #side { width:240px; height:100vh; float:right; padding:10px; box-sizing:border-box; background:#0f0f0f; overflow:auto; }
    label { display:block; margin-top:6px; font-size:13px; color:#ddd; }
    input[type=range]{ width:100%; }
    button, select { margin-top:6px; width:100%; padding:6px; }
    #gpsCanvas { width:220px; height:220px; background:#111; border:1px solid #333; display:block; margin-top:6px; }
    #status { font-size:12px; margin-top:6px; color:#9f9; }
  </style>
</head>
<body>



  <div id="ui">
    <input id="fileInput" type="file" accept=".csv" />
    <label>Or paste CSV URL to fetch:</label>
    <input id="csvUrl" type="text" placeholder="https://.../imu_data.csv" style="width:300px" />
    <button id="btnFetch">Fetch CSV</button>

    <label>Play / Pause</label>
    <button id="btnPlay">Play</button>
    <label>Speed (×)</label>
    <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1" />
    <span id="speedVal">1×</span>

    <label>Frame</label>
    <input id="frameSlider" type="range" min="0" max="0" step="1" value="0" />
    <div id="status">No data loaded</div>
  </div>
  
 <!--    --------------- Button for callibration and Refresh ---------------- -->
  <div style="margin-left: 80%;">

    <button style="margin-top:10px; width:200px;"onclick="calibrate()">Calibrate</button>
    <button style="margin-top:10px; width:200px;" onclick="resetCalibration()">Reset Cal</button>

  </div>
  
  <div id="canvasContainer"></div>
  
  <div id="side">
    <h3 style="margin:0 0 8px 0">GPS Path</h3>
    <canvas id="gpsCanvas" width="220" height="220"></canvas>
    <label>Map scale padding</label>
    <input id="padRange" type="range" min="0" max="0.01" step="0.0001" value="0.0005" />
    <label style="margin-top:8px">Rotation mapping</label>
    <select id="rotationOrder">
      <option value="ZYX" selected>Euler order Z (roll) → Y (yaw) → X (pitch) (ZYX)</option>
      <option value="YXZ">YXZ</option>
      <option value="XYZ">XYZ</option>
    </select>
    <label style="margin-top:8px">Axis mapping hints</label>
    <div style="font-size:12px; color:#bbb">
      If the cube looks inverted, try a different rotation order or swap yaw/pitch/roll mapping in the code.
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
  <!-- PapaParse for CSV -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

const btnFetch = document.getElementById('btnFetch');
const csvUrl = document.getElementById('csvUrl');

let lastFrameTime = null;
let playbackSpeed = 1.0;

let cal = { yaw: 0, pitch: 0, roll: 0 }; //Callibration variables.

let lastYaw = 0, lastPitch = 0, lastRoll = 0; //To save last updated callibrated position

//Attempt to load last callibration.
  try {
    const saved = localStorage.getItem("imu_calibration");
    if (saved) cal = JSON.parse(saved);
  } catch (e) { /* ignore */ }
  
  // Calibration of mobile initial position.

  function updateCube(yaw, pitch, roll) {

      // Apply calibration offsets
      const cy = yaw   - cal.yaw;
      const cp = pitch - cal.pitch;
      const cr = roll  - cal.roll;

      cube.rotation.set(
          THREE.MathUtils.degToRad(cp),
          THREE.MathUtils.degToRad(cy),
          THREE.MathUtils.degToRad(cr)
      );
  }

  

  function calibrate() {
    // use the most recent measured values as baseline
    cal.yaw   = lastYaw || 0;
    cal.pitch = lastPitch || 0;
    cal.roll  = lastRoll || 0;
    try { localStorage.setItem("imu_calibration", JSON.stringify(cal)); } catch(e){}
    console.log("Calibrated:", cal);
    status.textContent = `Calibrated: yaw=${cal.yaw.toFixed(2)} pitch=${cal.pitch.toFixed(2)} roll=${cal.roll.toFixed(2)}`;
  }


  //Reset Callibration Button Js
  function resetCalibration(){
    cal = { yaw:0, pitch:0, roll:0 };
    try{ localStorage.removeItem("imu_calibration"); }catch(e){}
    status.textContent = "Calibration reset";
  }

// header mapping: automatically detect common headers (case-insensitive)
function mapHeaders(fields) {
  const h = fields.map(s => s.trim().toLowerCase());
  let idx = {};
  const find = nameList => {
    for (const name of nameList) {
      const i = h.indexOf(name);
      if (i >= 0) return i;
    }
    return -1;
  };
  idx.device = find(['device_id','device','id']);
  idx.timestamp = find(['timestamp','time','ts','t']);
  idx.ax = find(['ax','accel_x','acc_x']);
  idx.ay = find(['ay','accel_y','acc_y']);
  idx.az = find(['az','accel_z','acc_z']);
  idx.azimuth = find(['azimuth','yaw']);
  idx.pitch = find(['pitch']);
  idx.roll = find(['roll']);
  idx.lat = find(['lat','latitude']);
  idx.lon = find(['lon','lng','longitude']);
  idx.speed = find(['speed','spd','vel']);
  return idx;
}

function parseCSVText(text) {
  const parsed = Papa.parse(text.trim(), {skipEmptyLines:true});
  if (parsed.errors.length) {
    console.warn("CSV parse errors:", parsed.errors);
  }
  if (!parsed.data || parsed.data.length === 0) {
    status.textContent = "No CSV rows parsed.";
    return;
  }
  // if first row contains headers detect them
  let fields = parsed.data[0].map(s => (s||'').toString());
  let startRow = 0;
  const lower0 = fields.map(f => f.toLowerCase());
  if (lower0.some(f => ['device_id','timestamp','ax','lat','azimuth','pitch','roll'].includes(f))) {
    startRow = 1;
  }
  const mapping = mapHeaders(fields);
  // If no obvious lat/lon in header, we will try to guess from last columns later

  data = [];
  for (let r = startRow; r < parsed.data.length; r++) {
    const row = parsed.data[r].map(c => (c||'').toString().trim());
    // try to build a record using mapping; if mapping missing, attempt heuristic positions
    const rec = {};
    rec.device = mapping.device >=0 ? row[mapping.device] : (row[0]||'device');
    // timestamp
    if (mapping.timestamp >=0) {
      rec.ts = Number(row[mapping.timestamp]) || null;
    } else {
      rec.ts = null;
    }
    // orientation / imu
    rec.azimuth = mapping.azimuth>=0 ? Number(row[mapping.azimuth]) : (isNumber(row[5])?Number(row[5]):null);
    rec.pitch   = mapping.pitch>=0   ? Number(row[mapping.pitch])   : (isNumber(row[6])?Number(row[6]):null);
    rec.roll    = mapping.roll>=0    ? Number(row[mapping.roll])    : (isNumber(row[7])?Number(row[7]):null);
    // lat/lon
    if (mapping.lat>=0 && mapping.lon>=0) {
      rec.lat = Number(row[mapping.lat]) || null;
      rec.lon = Number(row[mapping.lon]) || null;
    } else {
      // heuristic: last 3 fields often are lat, lon, speed
      const L = row.length;
      if (L>=3 && isNumber(row[L-3]) && isNumber(row[L-2])) {
        rec.lat = Number(row[L-3]);
        rec.lon = Number(row[L-2]);
      } else {
        rec.lat = null; rec.lon = null;
      }
    }
    data.push(rec);
  }

  // fill timestamps if missing
  let base = Date.now();
  let lastTs = null;
  for (let i=0;i<data.length;i++) {
    if (data[i].ts === null || isNaN(data[i].ts)) {
      // create pseudo timestamp spaced by 100ms if missing
      data[i].ts = (lastTs||base) + 100;
    }
    lastTs = data[i].ts;
  }

  // set frame slider
  frameSlider.max = Math.max(0, data.length-1);
  frameSlider.value = 0;
  playIndex = 0;
  updateStatus();
  drawGPSSnapshot();
}

function isNumber(v) { return !isNaN(parseFloat(v)) && isFinite(v); }

fileInput.addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = () => parseCSVText(reader.result);
  reader.readAsText(f);
});

btnFetch.addEventListener('click', async ()=>{
  const url = csvUrl.value.trim();
  if(!url) return;
  status.textContent = "Fetching...";
  try {
    const resp = await fetch(url);
    const txt = await resp.text();
    parseCSVText(txt);
  } catch(err){ status.textContent = "Fetch error: "+err; }
});

speedInput.addEventListener('input', ()=>{
  playbackSpeed = Number(speedInput.value);

});

// frame scrub
frameSlider.addEventListener('input', () => {
  playIndex = Number(frameSlider.value);
  renderFrame(playIndex);
  updateStatus();
});

// play button
btnPlay.addEventListener('click', ()=>{
  playing = !playing;
  btnPlay.textContent = playing ? "Pause" : "Play";

// ---------- GPS canvas ----------
const gpsCanvas = document.getElementById('gpsCanvas');
const gctx = gpsCanvas.getContext('2d');

function drawGPSSnapshot() {
  gctx.fillStyle = "#0b0b0b";
  gctx.fillRect(0,0,gpsCanvas.width, gpsCanvas.height);
  if(!data || data.length==0) return;
  const pts = data.filter(d=>d.lat && d.lon);
  if(pts.length==0) return;
  const lats = pts.map(p => p.lat);
  const lons = pts.map(p => p.lon);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const pad = Number(padRange.value) || 0.0005;
  const minLatP = minLat - pad, maxLatP = maxLat + pad;
  const minLonP = minLon - pad, maxLonP = maxLon + pad;
  // map lat/lon to canvas coords
  function project(lat, lon){
    const x = (lon - minLonP)/(maxLonP - minLonP) * gpsCanvas.width;
    const y = gpsCanvas.height - (lat - minLatP)/(maxLatP - minLatP) * gpsCanvas.height;
    return [x,y];
  }
  // path
  gctx.beginPath();
  for(let i=0;i<pts.length;i++){
    const [x,y] = project(pts[i].lat, pts[i].lon);
    if(i==0) gctx.moveTo(x,y); else gctx.lineTo(x,y);
  }
  gctx.strokeStyle = "#4fc3f7";
  gctx.lineWidth = 2;
  gctx.stroke();
  // draw current position
  const [cx,cy] = project(pts[0].lat, pts[0].lon);
  gctx.fillStyle = "#f44336"; gctx.beginPath(); gctx.arc(cx,cy,4,0,Math.PI*2); gctx.fill();
}

padRange.addEventListener('input', ()=> drawGPSSnapshot());

// -----------------------------------(Window Sender)
function getWindow(i, size=50){
    if (!data || data.length < size) return null;
    const start = Math.max(0, i - size + 1);
    const slice = data.slice(start, start + size);
    // convert to model friendly format
    return slice.map(r => ({
        ax: r.ax || 0,
        ay: r.ay || 0,
        az: r.az || 0,
        azimuth: r.azimuth || 0,
        pitch: r.pitch || 0,
        roll: r.roll || 0
    }));
}
// -------------------------------------

// ---------- rendering & frame logic ----------
function renderFrame(i) {
  if(!data || data.length===0) return;
  const rec = data[Math.max(0, Math.min(data.length-1, i))];
  // map rec.azimuth/pitch/roll -> cube rotation
  const yaw = rec.azimuth || 0;   // degrees
  const pitch = rec.pitch || 0;   // degrees
  const roll = rec.roll || 0;     // degrees

  // rotation order from select //--------------------xxxxxxxxxxxx---------------------
  // apply calibration offsets (subtract baseline)
  const yawAdj   = yaw   - (cal.yaw || 0);
  const pitchAdj = pitch - (cal.pitch || 0);
  const rollAdj  = roll  - (cal.roll || 0);

  // update last* so calibrate() can use most-recent measured orientation
  lastYaw = yaw; lastPitch = pitch; lastRoll = roll;

  // rotation order from select
  const order = rotationOrderSelect.value || 'ZYX';

  // Build Euler from adjusted angles. Note mapping: (pitch, yaw, roll) used earlier — keep same mapping.
  const eulerAdj = new THREE.Euler(
    THREE.MathUtils.degToRad(pitchAdj),
    THREE.MathUtils.degToRad(yawAdj),
    THREE.MathUtils.degToRad(rollAdj),
    order
  );
  cube.setRotationFromEuler(eulerAdj);



  // update info
  const tsText = rec.ts ? (new Date(Number(rec.ts))).toLocaleString() : ("idx:"+i);
  infoDiv.innerHTML = `i=${i} ts=${tsText} <br> yaw=${yaw.toFixed(2)}° pitch=${pitch.toFixed(2)}° roll=${roll.toFixed(2)}°`;
  // update GPS canvas highlight
  drawGPSFrame(i);
}

function drawGPSFrame(i) {
  // refresh base snapshot first
  drawGPSSnapshot();
  const pts = data.filter(d=>d.lat && d.lon);
  if(pts.length==0) return;
  // find nearest index in pts to global index i
  let j = Math.min(i, data.length-1);
  // find last available lat/lon at or before index i
  while(j>=0 && !(data[j].lat && data[j].lon)) j--;
  if(j<0) return;
  // compute projection as earlier
  const lats = pts.map(p=>p.lat), lons = pts.map(p=>p.lon);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const pad = Number(padRange.value) || 0.0005;
  const minLatP = minLat - pad, maxLatP = maxLat + pad;
  const minLonP = minLon - pad, maxLonP = maxLon + pad;
  function project(lat, lon){
    const x = (lon - minLonP)/(maxLonP - minLonP) * gpsCanvas.width;
    const y = gpsCanvas.height - (lat - minLatP)/(maxLatP - minLatP) * gpsCanvas.height;
    return [x,y];
  }
  const [x,y] = project(data[j].lat, data[j].lon);
  gctx.fillStyle = "#ffcc00"; gctx.beginPath(); gctx.arc(x,y,6,0,Math.PI*2); gctx.fill();
}

//animation loop (New)
  // animation loop
  function animate(now) {
    requestAnimationFrame(animate);

    if (!data || data.length===0) {
      renderer.render(scene, camera);
      return;
    }

    if (playing) {
      if (!lastFrameTime) lastFrameTime = now;
      const dt = (now - lastFrameTime) * playbackSpeed;
      const frameAdvance = Math.max(1, Math.floor(dt/100)); 
      playIndex = Math.min(data.length-1, playIndex + frameAdvance);
      frameSlider.value = playIndex;
      lastFrameTime = now;

      renderFrame(playIndex);

      if (playIndex >= data.length-1) { 
        playing = false; 
        btnPlay.textContent = "Play"; 
      }
    } else {
      renderFrame(playIndex);
    }

    // 🔥 prediction every ~20 frames
    // if (playIndex % 20 === 0 && now - lastPredictionFetch > 500) {
    //   lastPredictionFetch = now;
    //   updatePrediction();
    // }

    if (playIndex % 5 === 0 && now - lastPredictionFetch > 200) {
        lastPredictionFetch = now;
        updatePredictionForFrame(playIndex);
    }


    // 🔥 DISPLAY PROBABILITY
    infoDiv.innerHTML += `<br>Rash Probability: ${(rashProbability*100).toFixed(1)}%`;
 //-----------------
  //   infoDiv.innerHTML =
  //   infoDiv.innerHTML.split("<br>")[0] +
  //   `<br>Rash Probability: ${(rashProbability * 100).toFixed(1)}%`;

  renderer.render(scene, camera);
  }

// Function Call --> Animate

  status.textContent = `Rows: ${data.length}  Frame: ${playIndex}/${Math.max(0,data.length-1)}`;
}

// Auto Refresh
let auto = false;

document.getElementById("btnAuto").addEventListener("click", () => {
    auto = !auto;
    document.getElementById("btnAuto").textContent = auto ? "Stop Auto-Refresh" : "Start Auto-Refresh";

    if (auto) autoFetchLoop();
});

async function autoFetchLoop() {
    while (auto) {
        await new Promise(r => setTimeout(r, 2000)); // refresh every 2 sec
        if (!auto) break;
        const url = csvUrl.value.trim();
        if (url) {
            try {
                const resp = await fetch(url);
                const txt = await resp.text();
                parseCSVText(txt);
            } catch(e){}
        }
    }
}
